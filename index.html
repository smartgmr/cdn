<!DOCTYPE html>
<html>
<head>
    <title>Canlı TV</title>
</head>
<body>
    <div id="liste">Yükleniyor... (Kendi IP'niz üzerinden bağlanılıyor)</div>

    <script>
        // Kullanıcı bu sayfayı açtığında, bu kod kullanıcının tarayıcısında çalışır.
        // Dolayısıyla istek kullanıcının IP'si ile gider.
        
        async function kanalGetir() {
            const token = "eyJhbGciOiJIUzI1NiJ9..."; // Senin Bearer Token'ın
            
            try {
                const response = await fetch('https://core-api.kablowebtv.com/api/channels?checkip=false', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'User-Agent': 'Mozilla/5.0 (Web0S; Linux/SmartTV)',
                        'Origin': 'https://lg-client.kablowebtv.com'
                    }
                });
                
                const data = await response.json();
                let html = "";
                
                data.forEach(kanal => {
                    html += `<div>${kanal.ChannelName} <a href="${kanal.DefaultStreamUrl}">İZLE</a></div>`;
                });
                
                document.getElementById('liste').innerHTML = html;
            } catch (error) {
                // BURASI ÖNEMLİ: CORS hatası alırsanız liste boş döner.
                document.getElementById('liste').innerHTML = "Hata: Tarayıcınız güvenli bağlantıyı engelledi (CORS).";
            }
        }

        kanalGetir();
    </script>
</body>
</html>
